<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roof Analysis - TX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:#f5f5f5;overflow-x:hidden}
    .main{display:flex;height:100vh;flex-direction:column}
    .map-container{flex:1;position:relative}
    #map{width:100%;height:100%}
    .sidebar{width:100%;max-width:400px;background:white;box-shadow:0 0 10px rgba(0,0,0,0.1);z-index:999;overflow-y:auto;max-height:50vh}
    .sidebar h1{color:#c41e3a;padding:12px;font-size:18px;background:#f9f9f9;border-bottom:2px solid #c41e3a}
    .stats{padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;background:#f0f0f0}
    .stat{padding:8px;text-align:center;background:white;border-radius:4px;font-size:12px}
    .stat-val{font-size:16px;font-weight:bold;color:#c41e3a}
    .filters{padding:12px;border-bottom:1px solid #ddd}
    .filter{margin-bottom:8px}
    .filter label{display:block;font-size:12px;font-weight:bold;margin-bottom:4px}
    .filter input,.filter select{width:100%;padding:6px;border:1px solid #ddd;border-radius:3px;font-size:12px}
    .prop-list{padding:8px;max-height:300px;overflow-y:auto}
    .prop-card{padding:10px;border:1px solid #ddd;margin-bottom:6px;cursor:pointer;border-radius:3px;background:white;transition:all 0.2s}
    .prop-card:hover{background:#f9f9f9;border-color:#c41e3a;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
    .prop-addr{font-weight:bold;color:#333;font-size:12px}
    .prop-score{color:#c41e3a;font-weight:bold;margin:4px 0}
    .prop-meta{font-size:11px;color:#999}
    .btns{padding:12px;display:flex;gap:8px}
    .btn{flex:1;padding:10px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px;transition:all 0.2s}
    .btn-primary{background:#c41e3a;color:white}
    .btn-primary:hover{background:#a01830}
    .btn-secondary{background:#2196F3;color:white}
    .btn-secondary:hover{background:#1976D2}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1001;justify-content:center;align-items:center;padding:20px}
    .modal.active{display:flex}
    .modal-box{background:white;border-radius:8px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;padding:20px}
    .modal-close{float:right;font-size:24px;cursor:pointer;color:#999}
    .modal-score{font-size:48px;color:#c41e3a;font-weight:bold;margin:15px 0}
    .modal-addr{font-weight:bold;font-size:14px;margin:10px 0;color:#333}
    .modal-detail{margin:15px 0;padding:10px;background:#f9f9f9;border-radius:4px;font-size:12px}
    .modal-detail strong{color:#666;display:block;margin-bottom:4px}
    .modal-btns{margin-top:15px;display:flex;gap:8px}
    .modal-btn{flex:1;padding:10px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px}
    .modal-btn-primary{background:#2196F3;color:white}
    .modal-btn-primary:hover{background:#1976D2}
    @media(min-width:768px){
        .main{flex-direction:row}
        .sidebar{width:350px;max-width:350px;max-height:100vh}
        .prop-list{max-height:calc(100vh - 320px)}
    }
    @media(max-width:480px){
        .stats{grid-template-columns:1fr}
        .modal{padding:10px}
        .modal-box{padding:15px}
    }
    </style>
</head>
<body>
    <div class="main">
        <div class="sidebar">
            <h1>🏠 Roof Analysis</h1>
            <div class="stats">
                <div class="stat"><div class="stat-val" id="total">0</div><div>Total</div></div>
                <div class="stat"><div class="stat-val" id="high">0</div><div>HIGH</div></div>
            </div>
            <div class="filters">
                <div class="filter">
                    <label>Min Score: <span id="scoreVal">70</span></label>
                    <input type="range" id="minScore" min="0" max="100" value="70" step="5" onchange="applyFilter()">
                </div>
                <div class="filter">
                    <label>County</label>
                    <select id="county" onchange="applyFilter()">
                        <option value="">All</option>
                        <option value="Wharton">Wharton</option>
                        <option value="Harris">Harris</option>
                        <option value="Montgomery">Montgomery</option>
                        <option value="Brazoria">Brazoria</option>
                    </select>
                </div>
            </div>
            <div class="prop-list" id="propList">Loading...</div>
            <div class="btns">
                <button class="btn btn-primary" onclick="exportCSV()">📥 CSV</button>
                <button class="btn btn-secondary" onclick="location.reload()">🔄 Refresh</button>
            </div>
        </div>
        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <span class="modal-close" onclick="closeModal()">×</span>
            <div class="modal-addr" id="modalAddr">Address</div>
            <div class="modal-score" id="modalScore">0</div>
            <div style="color:#666;margin-bottom:10px;font-size:12px" id="modalPriority">PRIORITY</div>
            <div class="modal-detail">
                <strong>Year Built:</strong><span id="modalYear">2000</span>
            </div>
            <div class="modal-detail">
                <strong>Est. Value:</strong><span id="modalValue">$300K</span>
            </div>
            <div class="modal-detail">
                <strong>County:</strong><span id="modalCounty">County</span>
            </div>
            <div class="modal-btns">
                <button class="modal-btn modal-btn-primary" onclick="googleMaps()">🗺️ Google Maps</button>
            </div>
        </div>
    </div>

    let map, props=PROPS, filtered=props;

    function init(){
        map=L.map('map').setView([29.5,-95.5],8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'©OSM',maxZoom:19}).addTo(map);
        render();
    }

    function render(){
        updateStats();
        renderList();
        renderMap();
    }

    function updateStats(){
        document.getElementById('total').textContent=filtered.length;
        document.getElementById('high').textContent=filtered.filter(p=>p.s>=70).length;
    }

    function renderList(){
        const html=filtered.slice(0,20).map(p=>`<div class="prop-card" onclick="showModal(${PROPS.indexOf(p)})"><div class="prop-addr">${p.a}</div><div class="prop-score">${p.s}</div><div class="prop-meta">${p.c}</div></div>`).join('');
        document.getElementById('propList').innerHTML=html||'No properties match';
    }

    function renderMap(){
        document.querySelectorAll('.prop-marker').forEach(m=>map.removeLayer(m));
        filtered.forEach((p,i)=>{
            const color=p.s>=70?'#c41e3a':p.s>=50?'#ff9800':'#4caf50';
            const circle=L.circleMarker([p.lat,p.lng],{radius:6,color:color,weight:2,fillOpacity:0.7}).bindPopup(`${p.a}<br>Score: ${p.s}`).addTo(map);
            circle.on('click',()=>showModal(i));
        });
    }

    function applyFilter(){
        const minScore=parseInt(document.getElementById('minScore').value);
        const county=document.getElementById('county').value;
        document.getElementById('scoreVal').textContent=minScore;
        filtered=props.filter(p=>p.s>=minScore&&(!county||p.c===county));
        render();
    }

    function showModal(idx){
        const p=props[idx];
        document.getElementById('modalAddr').textContent=p.a;
        document.getElementById('modalScore').textContent=p.s;
        document.getElementById('modalPriority').textContent=(p.s>=70?'HIGH PRIORITY':p.s>=50?'MEDIUM':'LOW');
        document.getElementById('modalYear').textContent=p.y;
        document.getElementById('modalValue').textContent='$'+Math.round(p.v/1000)+'K';
        document.getElementById('modalCounty').textContent=p.c;
        window.currentAddr=p.a+', '+p.c+', TX';
        document.getElementById('modal').classList.add('active');
    }

    function closeModal(){
        document.getElementById('modal').classList.remove('active');
    }

    function googleMaps(){
        window.open('https://www.google.com/maps/search/'+encodeURIComponent(window.currentAddr),'_blank');
    }

    function exportCSV(){
        let csv='Address,County,Year Built,Est. Value,Damage Score\n';
        filtered.forEach(p=>csv+=`"${p.a}",${p.c},${p.y},"$${p.v}",${p.s}\n`);
        const blob=new Blob([csv],{type:'text/csv'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;
        a.download='roof-analysis.csv';
        a.click();
    }

    window.addEventListener('load',init);
    document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
    </script>
